services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:v26.6.1
    user: "${UID}:${GID}"
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    environment:
      CONTINUWUITY_CONFIG: /etc/continuwuity/continuwuity.toml
      CONTINUWUITY_DATABASE_PATH: /var/lib/continuwuity
    ports:
      - "${SERVICE_CONTINUWUITY_BIND_PORT_CLIENT_API}:6167"
    volumes:
      - ../../etc/services/continuwuity/config:/etc/continuwuity:ro
      - ./continuwuity/data:/var/lib/continuwuity
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=500m

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
